<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="description" content="Audio visualization website using WaveSurfer.js">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔈</text></svg>">
    <title>Audio Visualizer</title>
    <style>
		* {
			box-sizing: border-box;
		}

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #file-input-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #file-input {
            background-color: #555;
            color: #fff;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }

        #waveform {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 90%;
        }

        #reset-area {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 50%;
            height: 10%;
            background-color: rgba(0, 0, 0, 0.6);
            cursor: pointer;
            border: 1px dashed #555;
            text-align: center;
            color: #555;
            font-size: 13px;
            justify-content: center;
            align-items: center;
            display: none;
        }

        #interaction-area {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 50%;
            height: 10%;
            background-color: rgba(0, 0, 0, 0.5);
            cursor: pointer;
            border: 1px dashed #555;
            text-align: center;
            color: #555;
            font-size: 13px;
            justify-content: center;
            align-items: center;
            display: none;
        }
    </style>
</head>
<body>
    <div id="file-input-container">
        <h1>Select an Audio File</h1>
        <input type="file" id="file-input" accept="audio/*">
    </div>
    <div id="waveform"></div>
    <div id="reset-area">reset and play</div>
    <div id="interaction-area">pause/play</div>
    <script src="https://cdn.jsdelivr.net/npm/wavesurfer.js@7"></script>
    <script>
        const fileInputContainer = document.getElementById('file-input-container');
        const fileInput = document.getElementById('file-input');
        const waveformContainer = document.getElementById('waveform');
        const interactionArea = document.getElementById('interaction-area');
        const resetArea = document.getElementById('reset-area');

        // ===== Tuning =====
        // Anzahl der berechneten Waveform-Punkte (mehr = feiner)
        const BUCKETS = 2000;
        // Kontrast-Exponent: 1 = neutrale RMS-Darstellung,
        // höhere Werte (2-3) spreizen die Unterschiede zwischen
        // laut und leise optisch weiter auseinander.
        const CONTRAST = 2.2;

        const waveSurfer = WaveSurfer.create({
            container: '#waveform',
            waveColor: '#ffffff',
            progressColor: '#dddddd',
            cursorColor: '#888888',
            height: 222,
            normalize: false,
        });

        waveSurfer.on('ready', () => {
            waveSurfer.play();
        });

        // Berechnet RMS-Energie pro Abschnitt, normalisiert auf das
        // 98. Perzentil (damit ein einzelner lauter Schlag nicht alles
        // staucht) und spreizt die Unterschiede mit einem Kontrast-
        // Exponenten. So bleiben sowohl komprimierte Musik (Metal) als
        // auch dynamische Songs sichtbar differenziert.
        function computeRmsPeaks(audioBuffer, buckets) {
            const channels = [];
            for (let c = 0; c < audioBuffer.numberOfChannels; c++) {
                channels.push(audioBuffer.getChannelData(c));
            }
            const length = channels[0].length;
            const bucketSize = Math.max(1, Math.floor(length / buckets));
            const peaks = new Float32Array(buckets);

            for (let i = 0; i < buckets; i++) {
                const start = i * bucketSize;
                const end = Math.min(start + bucketSize, length);
                let sum = 0;
                let count = 0;

                for (const ch of channels) {
                    for (let j = start; j < end; j++) {
                        sum += ch[j] * ch[j];
                        count++;
                    }
                }
                peaks[i] = Math.sqrt(sum / Math.max(1, count));
            }

            // Referenzpegel: 98. Perzentil der RMS-Werte
            const sorted = Array.from(peaks).sort((a, b) => a - b);
            const ref = sorted[Math.floor(sorted.length * 0.98)] || 1;

            for (let i = 0; i < buckets; i++) {
                const rel = Math.min(1, peaks[i] / ref);
                peaks[i] = Math.pow(rel, CONTRAST);
            }
            return peaks;
        }

        fileInput.addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            document.title = `Playing: ${file.name}`;

            try {
                const arrayBuffer = await file.arrayBuffer();
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer.slice(0));
                audioCtx.close();

                const peaks = computeRmsPeaks(audioBuffer, BUCKETS);

                fileInputContainer.style.display = 'none';
                waveformContainer.style.display = 'block';
                interactionArea.style.display = 'flex';
                resetArea.style.display = 'flex';

                // Vorberechnete Peaks übergeben -> WaveSurfer zeichnet unsere
                // dB-skalierte RMS-Kurve statt der Roh-Peaks.
                waveSurfer.loadBlob(file, [peaks], audioBuffer.duration);
            } catch (err) {
                console.error('Audio konnte nicht dekodiert werden:', err);
                alert('Diese Datei konnte nicht geladen werden.');
            }
        });

        document.addEventListener('keydown', (event) => {
            if (event.code === 'Space') {
                event.preventDefault();
                togglePlayback();
            }
        });

        interactionArea.addEventListener('click', togglePlayback);
        interactionArea.addEventListener('touchend', (event) => {
            event.preventDefault();
            togglePlayback();
        });

        resetArea.addEventListener('click', resetPlayback);
        resetArea.addEventListener('touchend', (event) => {
            event.preventDefault();
            resetPlayback();
        });

        function togglePlayback() {
            if (waveSurfer.isPlaying()) {
                waveSurfer.pause();
            } else {
                waveSurfer.play();
            }
        }

        function resetPlayback() {
            waveSurfer.seekTo(0);
            waveSurfer.play();
        }
    </script>
</body>
</html>
